<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: 'Inter', sans-serif; color: #2B1F19; background: #FAF6F1; }
  body { padding: 24px; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { width: 660px; background: #FAF6F1; border-radius: 16px; padding: 24px; display: flex; gap: 16px; align-items: flex-start; }
  .sample { flex: 1; background: #fff; border-radius: 12px; padding: 16px; font-size: 13px; color: #1a1a1a; }
  .sh-1 { box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .sh-2 { box-shadow: 0 4px 16px rgba(0,0,0,0.10); }
  .sh-3 { box-shadow: 0 4px 24px rgba(0,0,0,0.12); }
  .sh-4 { box-shadow: 0 -2px 12px rgba(0,0,0,0.04); }
  .name { font-size: 11px; font-weight: 700; color: #2B1F19; margin-bottom: 4px; }
  .spec { font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: #8C7A6A; }
</style>
</head>
<body>
  <div class="card">
    <div class="sample sh-1">
      <div class="name">Card resting</div>
      <div class="spec">0 1 4 rgba(0,0,0,.08)</div>
    </div>
    <div class="sample sh-2">
      <div class="name">Card hover</div>
      <div class="spec">0 4 16 rgba(0,0,0,.10)</div>
    </div>
    <div class="sample sh-3">
      <div class="name">Menu / dropdown</div>
      <div class="spec">0 4 24 rgba(0,0,0,.12)</div>
    </div>
    <div class="sample sh-4">
      <div class="name">Nav top edge</div>
      <div class="spec">0 -2 12 rgba(0,0,0,.04)</div>
    </div>
  </div>
</body>
</html>
