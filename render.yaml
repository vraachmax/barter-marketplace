databases:
  - name: barter-db
    plan: free
    databaseName: barter
    user: barter

services:
  - type: web
    name: barter-api
    plan: free
    runtime: node
    buildCommand: npm install && cd apps/api && npx prisma generate && npx tsc -p tsconfig.build.json
    startCommand: cd apps/api && npx prisma migrate deploy && node dist/main
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: barter-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
